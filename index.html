<head>

<meta name="twitter:description" content="Plataforma de la Escuela Ministerial · Ministerio Internacional Fuente de Vida.">
<meta name="twitter:image" content="https://crm-escuela-ministerial.vercel.app/og.jpg">
<meta name="twitter:image:alt" content="Escudo de la Escuela Ministerial Fuente de Vida">
<meta name="theme-color" content="#0a0a0a">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:#1d1d1f;
    background:#0a0a0a url('hero.jpg') center center / cover no-repeat;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding:32px 64px;
    overflow-x:hidden;
    letter-spacing:-.01em;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  body::before{
    content:"";
    position:fixed;inset:0;
    background:linear-gradient(90deg,rgba(0,0,0,0) 0%,rgba(0,0,0,0) 45%,rgba(0,0,0,.4) 100%);
    pointer-events:none;z-index:0;
  }
  .card{
    position:relative;z-index:1;
    background:rgba(255,255,255,.94);
    backdrop-filter:saturate(180%) blur(24px);
    -webkit-backdrop-filter:saturate(180%) blur(24px);
    border-radius:22px;
    padding:30px 30px 26px;
    width:100%;max-width:380px;
    box-shadow:0 30px 70px rgba(0,0,0,.55),0 4px 12px rgba(0,0,0,.25);
    border:1px solid rgba(255,255,255,.4);
  }
  .card h1{
    font-size:20px;font-weight:600;letter-spacing:-.015em;
    text-align:center;margin-bottom:4px;color:#1d1d1f;
  }
  .card .sub{
    text-align:center;color:#6b7280;font-size:12.5px;
    margin-bottom:22px;letter-spacing:.02em;text-transform:uppercase;font-weight:500;
  }
  label{
    display:block;font-size:12.5px;font-weight:500;
    color:#374151;margin:14px 0 6px;
  }
  input{
    width:100%;padding:11px 14px;
    border:1px solid #d1d5db;border-radius:12px;
    font-size:14.5px;background:#fff;color:#1d1d1f;
    font-family:inherit;transition:.15s;
  }
  input:focus{
    outline:none;border-color:#b8860b;
    box-shadow:0 0 0 4px rgba(184,134,11,.18);
  }
  .btn{
    width:100%;padding:12px;border:none;border-radius:12px;
    font-size:14.5px;font-weight:600;cursor:pointer;
    transition:.15s;font-family:inherit;
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .btn:active{transform:scale(.98)}
  .btn[disabled]{opacity:.6;cursor:not-allowed}
  .btn-primary{
    background:linear-gradient(180deg,#d4af37 0%,#a37a1f 100%);
    color:#fff;margin-top:18px;
    box-shadow:0 4px 14px rgba(164,122,31,.35);
  }
  .btn-primary:hover{filter:brightness(1.06)}
  .divider{
    display:flex;align-items:center;gap:10px;
    margin:18px 0 14px;color:#9ca3af;
    font-size:11.5px;text-transform:uppercase;letter-spacing:.1em;
  }
  .divider::before,.divider::after{
    content:"";flex:1;height:1px;background:#e5e7eb;
  }
  .btn-google{
    background:#fff;border:1px solid #d1d5db;color:#1f2937;
  }
  .btn-google:hover{background:#f9fafb;border-color:#9ca3af}
  .msg{
    margin-top:14px;padding:10px 12px;border-radius:10px;
    font-size:13px;display:none;
  }
  .msg.err{background:rgba(255,59,48,.1);color:#b91c1c;display:block}
  .msg.ok{background:rgba(52,199,89,.12);color:#166534;display:block}
  .footer{
    position:relative;z-index:1;
    margin-top:18px;text-align:center;
    color:rgba(255,255,255,.65);font-size:11.5px;letter-spacing:.04em;
  }
  @media(max-width:820px){
    body{align-items:flex-end;justify-content:center;padding:32px 20px 40px}
    body::before{background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,.15) 45%,rgba(0,0,0,.75) 100%)}
  }
  @media(max-width:520px){
    body{padding:20px}
    .card{padding:26px 22px 22px}
  }
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;gap:14px;position:relative;z-index:1;width:100%;max-width:380px">
  <form class="card" id="loginForm" autocomplete="on">
    <h1>Acceso administrativo</h1>
    <p class="sub">Escuela Ministerial · Fuente de Vida</p>

    <label for="email">Correo</label>
    <input type="email" id="email" name="email" required autocomplete="email" placeholder="tu@correo.com">

    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">

    <div class="msg" id="msg"></div>

    <button type="submit" class="btn btn-primary" id="submitBtn">Iniciar sesión</button>

    <div class="divider">o</div>

    <button type="button" class="btn btn-google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continuar con Google
    </button>
  </form>
  <p class="footer">© Ministerio Internacional Fuente de Vida</p>
</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
  const SUPABASE_URL = "https://dnevnciffmnkfxhniejd.supabase.co";
  const SUPABASE_KEY = "sb_publishable_K-A5NMumo_vHRqmedWJ6UA_hSVTgI2L";
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const form = document.getElementById("loginForm");
  const msg = document.getElementById("msg");
  const submitBtn = document.getElementById("submitBtn");
  const googleBtn = document.getElementById("googleBtn");

  const showMsg = (text, kind="err") => {
    msg.textContent = text;
    msg.className = "msg " + kind;
  };
  const clearMsg = () => { msg.className = "msg"; msg.textContent = ""; };

  // Si ya hay sesión, ir directo al CRM
  const { data: { session } } = await supabase.auth.getSession();
  if (session) { location.replace("/crm.html"); }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearMsg();
    submitBtn.disabled = true;
    submitBtn.textContent = "Verificando…";
    const email = form.email.value.trim();
    const password = form.password.value;
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      showMsg(error.message === "Invalid login credentials" ? "Correo o contraseña incorrectos." : error.message, "err");
      submitBtn.disabled = false;
      submitBtn.textContent = "Iniciar sesión";
      return;
    }
    location.replace("/crm.html");
  });

  googleBtn.addEventListener("click", async () => {
    clearMsg();
    googleBtn.disabled = true;
    const { error } = await supabase.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: location.origin + "/crm.html" }
    });
    if (error) {
      showMsg(error.message, "err");
      googleBtn.disabled = false;
    }
  });
</script>
</body>
</html>
